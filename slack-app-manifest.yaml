display_information:
  name: Agents party
  description: Slack-native agent routing for channel and thread workflows.
  background_color: "#1f2937"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  assistant_view:
    assistant_description: Slack-native assistant for channel and thread workflows.
  bot_user:
    display_name: Agents party
    always_online: false
oauth_config:
  redirect_urls:
    - https://agents-party.example.com/slack/oauth_redirect
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - channels:history
      - channels:join
      - channels:read
      - chat:write
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - reactions:read
      - users:read
    user:
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - search:read.files
      - search:read.im
      - search:read.mpim
      - search:read.private
      - search:read.public
      - search:read.users
      - users:read
      - users:read.email
settings:
  event_subscriptions:
    request_url: https://agents-party.example.com/slack/events
    bot_events:
      - app_home_opened
      - app_mention
      - assistant_thread_context_changed
      - assistant_thread_started
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
  interactivity:
    is_enabled: true
    request_url: https://agents-party.example.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: true
