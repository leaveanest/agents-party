display_information:
  name: Agents party
  description: Slack-native agent routing for channel and thread workflows.
  background_color: "#1f2937"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: false
  bot_user:
    display_name: Agents party
    always_online: false
oauth_config:
  redirect_urls:
    - https://agents-party.example.com/slack/oauth_redirect
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - chat:write
      - files:read
      - files:write
      - groups:history
      - im:history
      - mpim:history
      - reactions:read
      - users:read
settings:
  event_subscriptions:
    request_url: https://agents-party.example.com/slack/events
    bot_events:
      - app_home_opened
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      - reaction_added
  interactivity:
    is_enabled: true
    request_url: https://agents-party.example.com/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
